steps:
  # 1. Install dependencies
  - name: 'node:20-alpine'
    entrypoint: 'npm'
    args: ['ci']

  # 2. Run linter
  - name: 'node:20-alpine'
    entrypoint: 'npm'
    args: ['run', 'lint', '--', '--max-warnings', '0']

  # 3. Run unit tests with coverage
  - name: 'node:20-alpine'
    entrypoint: 'npm'
    args: ['run', 'test:coverage']

  # 4. Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/$_SERVICE:$COMMIT_SHA', '.']

  # 5. Push to Artifact Registry (using GCR alias for simplicity as requested)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/$_SERVICE:$COMMIT_SHA']

  # 6. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE'
      - '--image'
      - 'gcr.io/$PROJECT_ID/$_SERVICE:$COMMIT_SHA'
      - '--region'
      - '$_REGION'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--concurrency'
      - '80'
      - '--timeout'
      - '30s'
      - '--service-account'
      - 'carbontrace-runner@$PROJECT_ID.iam.gserviceaccount.com'
      - '--allow-unauthenticated'
      # Production Environment variables and Secrets
      - '--set-env-vars'
      - 'NODE_ENV=production'
      - '--update-secrets'
      - 'GEMINI_API_KEY=GEMINI_API_KEY:latest,FIREBASE_SERVICE_ACCOUNT_KEY=FIREBASE_SERVICE_ACCOUNT_KEY:latest'

  # 7. Run smoke test
  - name: 'gcr.io/cloud-builders/curl'
    args: ['-s', '-f', '-o', '/dev/null', '-w', '%%{http_code}', 'https://$_SERVICE-$PROJECT_ID.run.app/api/health']

substitutions:
  _REGION: 'us-central1'
  _SERVICE: 'carbontrace-ai'

images:
  - 'gcr.io/$PROJECT_ID/$_SERVICE:$COMMIT_SHA'
